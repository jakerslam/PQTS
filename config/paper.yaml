# Paper Trading Configuration
# This configuration runs the trading system in paper trading mode
# No real money is used - all trades are simulated

mode: paper_trading

# ============================================
# MARKET ADAPTERS
# ============================================
markets:
  crypto:
    enabled: true
    exchanges:
      - name: binance
        api_key: ${BINANCE_TESTNET_API_KEY}
        api_secret: ${BINANCE_TESTNET_API_SECRET}
        testnet: true
        symbols:
          - BTCUSDT
          - ETHUSDT
          - SOLUSDT
          - ADAUSDT
          - DOTUSDT
        
      - name: coinbase
        api_key: ${COINBASE_SANDBOX_API_KEY}
        api_secret: ${COINBASE_SANDBOX_SECRET}
        passphrase: ${COINBASE_SANDBOX_PASSPHRASE}
        sandbox: true
        symbols:
          - BTC-USD
          - ETH-USD
          - SOL-USD
  
  equities:
    enabled: true
    brokers:
      - name: alpaca
        api_key: ${ALPACA_PAPER_API_KEY}
        api_secret: ${ALPACA_PAPER_API_SECRET}
        paper: true
        symbols:
          - AAPL
          - MSFT
          - TSLA
          - NVDA
          - META
  
  forex:
    enabled: true
    brokers:
      - name: oanda
        api_key: ${OANDA_API_KEY}
        account_id: ${OANDA_ACCOUNT_ID}
        practice: true
        pairs:
          - EUR_USD
          - GBP_USD
          - USD_JPY
          - AUD_USD

# ============================================
# STRATEGIES
# ============================================
strategies:
  scalping:
    enabled: true
    max_positions: 3
    timeframes: ['1m', '5m']
    min_spread: 0.001
    max_hold_time: 300
    risk_reward_ratio: 1.5
  
  arbitrage:
    enabled: true
    min_spread_pct: 0.1
    max_execution_time_ms: 500
  
  trend_following:
    enabled: true
    timeframes: ['1h', '4h', '1d']
    max_positions: 5
  
  mean_reversion:
    enabled: true
    lookback: 20
    max_positions: 3
    overbought: 70
    oversold: 30
  
  ml:
    enabled: true
    model_type: ensemble
    confidence_threshold: 0.6
    retrain_interval_hours: 24
    prediction_horizon: 1h
  
  volume_profile:
    enabled: true
    lookback_periods: 24
    value_area_pct: 0.70
    min_volume_node: 0.05
  
  order_flow:
    enabled: true
    lookback_ticks: 100
    large_order_threshold: 10.0
  
  liquidity_sweep:
    enabled: true
    lookback_periods: 100
    min_touches: 2
    sweep_threshold: 0.005
    reclaim_threshold: 0.003

# ============================================
# RISK MANAGEMENT
# ============================================
risk:
  initial_capital: 10000.0
  risk_tolerance_profile: balanced  # conservative, balanced, aggressive, professional, or custom key
  risk_tolerance_profiles:
    prop_desk:
      description: "Higher-capacity profile for experienced desk operators"
      risk_limit_scale: 1.2
      canary_allocation_scale: 1.1
  max_portfolio_risk_pct: 2.0
  max_position_risk_pct: 1.0
  max_drawdown_pct: 10.0
  max_correlation: 0.7
  max_positions: 15
  max_leverage: 2.0
  daily_loss_limit: 500.0
  position_sizing: kelly_half  # kelly_full, kelly_half, fixed_amount, risk_pct
  stop_loss: true
  trailing_stop: true

# ============================================
# RISK MANAGEMENT
# ============================================
analytics:
  data_dir: data/analytics
  report_interval_hours: 24
  save_trades: true
  update_equity: true

# ============================================
# DASHBOARD
# ============================================
dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8050
  debug: false
  update_interval_ms: 5000

# ============================================
# BACKTESTING
# ============================================
backtesting:
  data_dir: data/historical
  commission_rate: 0.001
  slippage_model: fixed
  slippage_bps: 5

# ============================================
# LOGGING
# ============================================
logging:
  level: INFO
  file: logs/pqts.log
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  max_size_mb: 100
  backup_count: 5

# ============================================
# NOTIFICATIONS
# ============================================
notifications:
  enabled: true
  on_trade: true
  on_error: true
  on_drawdown: 5.0  # Notify if drawdown exceeds 5%
