name: PQTS CI

on:
  push:
    branches:
      - main
      - prod
  pull_request:
    branches:
      - main
      - prod
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify_workflow_raw:
    name: Verify CI YAML on GitHub Raw
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify raw workflow structure
        run: |
          python3 tools/verify_ci_raw.py \
            --sha "${GITHUB_SHA}" \
            --repo "${GITHUB_REPOSITORY}"

  verify_dependency_lock:
    name: Verify Dependency Lock
    needs: verify_workflow_raw
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify lock file structure
        run: python3 tools/verify_dependency_lock.py

  test:
    name: Pytest
    needs: [verify_workflow_raw, verify_dependency_lock]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (gating)
        run: pytest tests -q

  lint:
    name: Lint
    needs: [verify_workflow_raw, verify_dependency_lock]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint (gating)
        run: ruff check core execution risk analytics --select E9,F63,F7,F82

      - name: Black format check (gating)
        run: black --check core execution risk analytics

      - name: Isort import check (gating)
        run: isort --check-only core execution risk analytics

      - name: Flake8 hard errors (gating)
        run: flake8 core execution risk analytics --count --select=E9,F63,F7,F82 --show-source --statistics

  static_analysis:
    name: Bandit and Mypy (non-gating)
    needs: [verify_workflow_raw, verify_dependency_lock]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install analysis tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bandit (non-gating)
        continue-on-error: true
        run: bandit -r execution risk core backtesting strategies

      - name: Run mypy baseline (non-gating)
        continue-on-error: true
        run: mypy execution risk core --ignore-missing-imports

      - name: Run mypy strict phase modules (non-gating)
        continue-on-error: true
        run: mypy analytics/paper_readiness.py execution/paper_campaign.py execution/paper_fill_model.py execution/tca_feedback.py
