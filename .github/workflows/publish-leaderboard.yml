name: Publish Simulation Leaderboard

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "data/reports/simulation_leaderboard_*.csv"
      - "scripts/export_simulation_leaderboard_site.py"
      - ".github/workflows/publish-leaderboard.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: leaderboard-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build static leaderboard page
        run: |
          python3 scripts/export_simulation_leaderboard_site.py \
            --reports-dir data/reports \
            --output-dir site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
